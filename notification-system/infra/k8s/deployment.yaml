apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-system
  labels:
    app: notification-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-system
  template:
    metadata:
      labels:
        app: notification-system
    spec:
      containers:
      - name: notification-system
        image: your-docker-image:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
      imagePullSecrets:
      - name: regcred